basePath: /
definitions:
  inbound.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    type: object
  inbound.ConfirmTOTPRequest:
    properties:
      code:
        type: string
      mfa_id:
        type: integer
    type: object
  inbound.EmailVerifyRequest:
    properties:
      token:
        type: string
    type: object
  inbound.ForgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  inbound.LoginMFARequest:
    properties:
      challenge_id:
        type: string
      code:
        type: string
    type: object
  inbound.LoginMFAResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  inbound.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  inbound.LoginResponse:
    properties:
      access_token:
        type: string
      challenge_id:
        type: string
      mfa_required:
        type: boolean
      refresh_token:
        type: string
    type: object
  inbound.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  inbound.ProfileResponse:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      status:
        type: string
    type: object
  inbound.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    type: object
  inbound.RefreshTokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  inbound.RegisterRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        type: string
    type: object
  inbound.RegisterResendRequest:
    properties:
      email:
        type: string
    type: object
  inbound.RegisterResendesponse:
    type: object
  inbound.ResetPasswordRequest:
    properties:
      new_password:
        type: string
      token:
        type: string
    type: object
  inbound.SetupTOTPRequest:
    properties:
      friendly_name:
        type: string
    type: object
  inbound.SetupTOTPResponse:
    properties:
      mfa_id:
        type: integer
      secret:
        type: string
      uri:
        type: string
    type: object
  inbound.UpdateProfileRequest:
    properties:
      full_name:
        type: string
    type: object
  router.errorResponse:
    properties:
      error:
        additionalProperties:
          type: string
        type: object
      message:
        example: example string message
        type: string
    type: object
  router.messageResponse:
    properties:
      message:
        example: example string message
        type: string
    type: object
  router.successResponse:
    properties:
      data: {}
      message:
        example: example string message
        type: string
      meta:
        additionalProperties: {}
        type: object
    type: object
host: localhost:8080
info:
  contact:
    email: support@gobite.com
    name: Gobite API Support
    url: https://gobite.com/contact
  description: Gobite provides authentication and profile management APIs.
  license:
    name: MIT
    url: https://mit-license.org/
  termsOfService: https://gobite.com/terms
  title: Gobite API
  version: "1.0"
paths:
  /:
    get:
      description: Just says hi
      produces:
      - application/json
      responses:
        "200":
          description: Health response
          schema:
            $ref: '#/definitions/router.messageResponse'
      summary: Root endpoint
      tags:
      - System
  /api/v1/auth/email/verify:
    post:
      consumes:
      - application/json
      description: Confirms the user's email address using the provided verification
        token.
      parameters:
      - description: Email verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.EmailVerifyRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "404":
          description: Verification token not found
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Verify email
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Validates credentials and returns access/refresh tokens. If MFA
        is required, a challenge ID is returned.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Authentication result
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.LoginResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Authenticate user
      tags:
      - Auth
  /api/v1/auth/login/mfa:
    post:
      consumes:
      - application/json
      description: Verifies the MFA code for a login challenge and returns access/refresh
        tokens.
      parameters:
      - description: MFA login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.LoginMFARequest'
      produces:
      - application/json
      responses:
        "200":
          description: Authentication result
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.LoginMFAResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Invalid MFA code
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Complete MFA login
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidates the provided refresh token.
      parameters:
      - description: Logout payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.LogoutRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Logout
      tags:
      - Auth
  /api/v1/auth/logout-all:
    post:
      description: Invalidates all refresh tokens for the authenticated user.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Logout all sessions
      tags:
      - Auth
  /api/v1/auth/mfa/totp/confirm:
    post:
      consumes:
      - application/json
      description: Verifies the TOTP code and activates the MFA factor.
      parameters:
      - description: TOTP confirmation payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.ConfirmTOTPRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorResponse'
        "404":
          description: MFA factor not found
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Confirm TOTP
      tags:
      - Auth
  /api/v1/auth/mfa/totp/setup:
    post:
      consumes:
      - application/json
      description: Creates a TOTP factor and returns the shared secret and otpauth
        URI.
      parameters:
      - description: TOTP setup payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.SetupTOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: TOTP setup result
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.SetupTOTPResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Setup TOTP
      tags:
      - Auth
  /api/v1/auth/password/change:
    post:
      consumes:
      - application/json
      description: Updates the user's password after validating the current password.
      parameters:
      - description: Change password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.ChangePasswordRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Change password
      tags:
      - Auth
  /api/v1/auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Sends password reset instructions to the provided email address.
      parameters:
      - description: Forgot password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.ForgotPasswordRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Request password reset
      tags:
      - Auth
  /api/v1/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Sets a new password using the provided reset token.
      parameters:
      - description: Reset password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.ResetPasswordRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "404":
          description: Reset token not found
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Reset password
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a refresh token for a new access/refresh token pair.
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refresh result
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.RefreshTokenResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Invalid refresh token
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new account and sends a verification email.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.RegisterRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "409":
          description: Email already registered
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Register user
      tags:
      - Auth
  /api/v1/auth/register/resend:
    post:
      consumes:
      - application/json
      description: Sends a new verification email when an account exists for the provided
        address.
      parameters:
      - description: Resend verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.RegisterResendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Resend result
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.RegisterResendesponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Resend verification email
      tags:
      - Auth
  /api/v1/profile:
    get:
      description: Returns profile information for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: Profile result
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.ProfileResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Get profile
      tags:
      - Auth
    put:
      consumes:
      - application/json
      description: Updates profile details for the authenticated user.
      parameters:
      - description: Profile update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.UpdateProfileRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Update profile
      tags:
      - Auth
  /health:
    get:
      description: Server health check endpoint
      produces:
      - application/json
      responses:
        "200":
          description: Root response
          schema:
            $ref: '#/definitions/router.messageResponse'
      summary: Health check
      tags:
      - System
schemes:
- http
- https
swagger: "2.0"
