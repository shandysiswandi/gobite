                  $ref: '#/definitions/inbound.GroupingPoliciesResponse'
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: List grouping policies
      tags:
      - IAM
    post:
      consumes:
      - application/json
      description: Adds grouping policies in single or batch format.
      parameters:
      - description: Grouping policies payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.GroupingPoliciesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Grouping policies added
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.MutationResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Add grouping policies
      tags:
      - IAM
  /api/v1/iam/policies:
    delete:
