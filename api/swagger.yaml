host: localhost:8080
info:
  contact:
    email: support@gobite.com
    name: Gobite API Support
    url: https://gobite.com/contact
  description: Gobite provides authentication and profile management APIs.
  license:
    name: MIT
    url: https://mit-license.org/
  termsOfService: https://gobite.com/terms
  title: Gobite API
  version: "1.0"
paths:
  /api/v1/iam/enforce:
    post:
      consumes:
      - application/json
      description: Evaluates a policy for the given subject, object, and action.
      parameters:
      - description: Enforcement payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.EnforceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Enforcement result
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.EnforceResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Enforce policy
      tags:
      - IAM
  /api/v1/iam/grouping-policies:
    delete:
      consumes:
      - application/json
      description: Removes grouping policies in single or batch format.
      parameters:
      - description: Grouping policies payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inbound.GroupingPoliciesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Grouping policies removed
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
                data:
                  $ref: '#/definitions/inbound.MutationResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/router.errorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/router.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/router.errorResponse'
      summary: Remove grouping policies
      tags:
      - IAM
    get:
      description: Returns all grouping policies in the enforcer.
      produces:
      - application/json
      responses:
        "200":
          description: Grouping policy list
          schema:
            allOf:
            - $ref: '#/definitions/router.successResponse'
            - properties:
