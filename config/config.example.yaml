# -----------------------------------------------------------------------------
# Application Configuration
# -----------------------------------------------------------------------------
tz: "Asia/Jakarta"

server:
  address:
    # The address and port the HTTP server will listen on.
    # 0.0.0.0 means it will listen on all available network interfaces.
    http: "0.0.0.0:8080"

# -----------------------------------------------------------------------------
# Database Configuration
# -----------------------------------------------------------------------------
database:
  # The full connection URL for the PostgreSQL database.
  # Format: postgres://[user]:[password]@[host]:[port]/[database_name]
  url: "postgres://user:password@localhost:5432/gobite?sslmode=disable"

# -----------------------------------------------------------------------------
# Redis Configuration
# -----------------------------------------------------------------------------
redis:
  # The connection URL for the Redis server.
  # Format: redis://[user]:[password]@[host]:[port]/[db_number]
  url: "redis://localhost:6379/1"

# -----------------------------------------------------------------------------
# Mail Configuration
# -----------------------------------------------------------------------------
mail:
  host: localhost
  port: 1025
  username: user
  password: password
  from: no-replay@gobite.com

# -----------------------------------------------------------------------------
# Messaging Configuration
# -----------------------------------------------------------------------------
messaging:
  nsq:
    # Address of the NSQ daemon (nsqd) used by producers to publish messages.
    # Default NSQ TCP port is 4150.
    producer_addr: "localhost:4150"

    # List of nsqd addresses consumers can connect to directly.
    # Use this when NOT using nsqlookupd (e.g. local development).
    consumer_nsqd_addrs: "localhost:4150"

    # List of nsqlookupd addresses used for service discovery.
    # Recommended for production deployments with multiple nsqd nodes.
    consumer_lookupd_addrs: "localhost:4161"

    producer_config:
      # Maximum number of messages that can be sent asynchronously
      # without receiving a response from nsqd.
      max_in_flight: 50

      # Timeout for establishing TCP connections to nsqd. In seconds
      dial_timeout: 5

      # Maximum duration to wait for a response when reading from nsqd. In seconds
      read_timeout: 60

      # Maximum duration to wait when writing data to nsqd. In seconds
      write_timeout: 60

    consumer_config:
      # Maximum number of messages that can be processed concurrently.
      # This should match the number of worker goroutines in your consumer.
      max_in_flight: 100

      # Interval at which the consumer polls nsqlookupd for new producers. In seconds
      lookupd_poll_interval: 60

# -----------------------------------------------------------------------------
# JWT Configuration
# -----------------------------------------------------------------------------
jwt:
  temp:
    # A 64-byte, base64-encoded secret key.
    # Generate with: openssl rand -base64 64
    secret: "your-super-secret-64-byte-long-session-key-for-testing"

    # Expiration time for temp tokens in minutes (e.g., 3).
    ttl: 3

  access:
    # A 64-byte, base64-encoded secret key.
    # Generate with: openssl rand -base64 64
    secret: "your-super-secret-64-byte-long-session-key-for-testing"

    # Expiration time for access tokens in minutes (e.g., 15).
    ttl: 15

  refresh:
    # A 64-byte, base64-encoded secret key.
    # Generate with: openssl rand -base64 64
    secret: "your-super-secret-64-byte-long-session-key-for-testing"

    # Expiration time for refresh tokens in days (e.g., 7).
    ttl: 7

# -----------------------------------------------------------------------------
# Password Configuration
# -----------------------------------------------------------------------------
password:
  cost: 12
  secret: secret

# -----------------------------------------------------------------------------
# Modules Configuration
# -----------------------------------------------------------------------------
modules:
  auth:
    #
    enabled: true

    # Expiration time for password reset in minutes (e.g., 15).
    password_reset_ttl: 15

  some:
    enabled: true
